<div class="container">

<h1>Task Manager</h1>

<div class="filters">

<input
type="text"
placeholder="Search tasks..."
[(ngModel)]="searchText"
(keyup)="applyFilters()"
/>

<select [(ngModel)]="statusFilter" (change)="applyFilters()">
<option value="">All Status</option>
<option value="Todo">Todo</option>
<option value="InProgress">In Progress</option>
<option value="Done">Done</option>
</select>

<select [(ngModel)]="priorityFilter" (change)="applyFilters()">
<option value="">All Priority</option>
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>

<select [(ngModel)]="assigneeFilter" (change)="applyFilters()">
<option [ngValue]="null">All Assignees</option>

<option *ngFor="let member of members" [ngValue]="member.id">
{{member.name}}
</option>

</select>

<button class="clear-btn" (click)="clearFilters()">
Clear Filters
</button>

<button class="create-btn" (click)="openCreateForm()">
+ Create Task
</button>

</div>

<hr>



<table>

<thead>

<tr>
<th>Title</th>
<th>Description</th>
<th>Status</th>
<th>Priority</th>
<th>Assignee</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let task of tasks">

<td>{{task.title}}</td>

<td>{{task.description}}</td>

<td>

<span
class="badge"
[ngClass]="{
'status-todo': task.status === 'Todo',
'status-progress': task.status === 'InProgress',
'status-done': task.status === 'Done'
}">
{{task.status}}
</span>

</td>

<td>

<span
class="badge"
[ngClass]="{
'priority-high': task.priority === 'High',
'priority-medium': task.priority === 'Medium',
'priority-low': task.priority === 'Low'
}">
{{task.priority}}
</span>

</td>

<td>{{task.assignee?.name || 'Unassigned'}}</td>

<td>

<button class="edit-btn" (click)="editTask(task)">
Edit
</button>

<button class="delete-btn" (click)="deleteTask(task.id)">
Delete
</button>

</td>

</tr>

</tbody>

</table>

<hr>


<div *ngIf="taskForm" class="form-container">

<h2 *ngIf="!isEditing">Create Task</h2>
<h2 *ngIf="isEditing">Edit Task</h2>

<div class="form-group">

<label>Title</label>

<input
type="text"
[(ngModel)]="taskForm.title"
placeholder="Task title"
/>

</div>

<div class="form-group">

<label>Description</label>

<textarea
[(ngModel)]="taskForm.description"
placeholder="Task description"
></textarea>

</div>

<div class="form-group">

<label>Status</label>

<select [(ngModel)]="taskForm.status">

<option value="Todo">Todo</option>
<option value="InProgress">In Progress</option>
<option value="Done">Done</option>

</select>

</div>

<div class="form-group">

<label>Priority</label>

<select [(ngModel)]="taskForm.priority">

<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>

</select>

</div>

<div class="form-group">

<label>Assign To</label>

<select [(ngModel)]="taskForm.assigneeId">

<option [ngValue]="null">Unassigned</option>

<option *ngFor="let member of members" [ngValue]="member.id">
{{member.name}}
</option>

</select>

</div>

<div class="form-actions">

<button *ngIf="!isEditing" class="save-btn" (click)="createTask()">
Save Task
</button>

<button *ngIf="isEditing" class="update-btn" (click)="updateTask()">
Update Task
</button>

<button class="cancel-btn" (click)="cancelForm()">
Cancel
</button>

</div>

</div>

</div>
